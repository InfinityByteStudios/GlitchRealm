# Enable Netlify's new AI-powered features
[build]
  # Enable AI-powered build failure explanations
  command = "echo 'Static site - no build command needed'"

[build.environment]
  # Firebase API keys are public by design and secured by Firestore rules
  # These are client-side keys, not server secrets
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyBu6Z3s66aDXeHQ3yxGW5O-VDUIv9cA8fM,AIzaSyCo5hr7ULHLL_0UAAst74g8ePZxkB7OHFQ,AIzaSyCR2qT5dVHP7p2cFpCEevOfPJiUIbjKemo"
  # Comma-separated admin/developer UIDs consumed by Netlify/Functions and admin tooling
  GLITCHREALM_ADMIN_UIDS = ""
  
# Netlify Observability - Request-level traces and logs
[dev]
  # Enable local observability during development
  autoLaunch = false
  
# AI Gateway configuration for future AI features
# Provides built-in credentials for OpenAI, Anthropic, and Google
[context.production.environment]
  NETLIFY_AI_GATEWAY_ENABLED = "true"

[functions]

  [functions.emails]
  included_files = [
    "./emails/**"
  ]

[context]

  [context.production]

    [context.production.functions]

      [context.production.functions.emails]
      included_files = [
        "./emails/**"
      ]

  [context.main]

    [context.main.functions]

      [context.main.functions.emails]
      included_files = [
        "./emails/**"
      ]

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/Games/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/css/styles.css"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/js/script.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/pages/**/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Enable Netlify Asset Optimization (minify & compress) at deploy time
[build.processing]
  skip_processing = false

############################################
# Plugin configuration overrides
# Add explicit plugin blocks here so we can disable or tune plugins
# installed via the Netlify UI while we investigate plugin failures.
# Note: UI-installed plugins are merged with this list; specifying
# an inputs value here can prevent the plugin from running if the
# plugin honours a disable flag. This is a defensive measure to
# avoid failed builds while we diagnose the root cause.
[[plugins]]
  package = "@netlify/plugin-emails"

# Prerendering plugin for SEO optimization
# Generates static HTML for dynamic game pages
[[plugins]]
  package = "@netlify/plugin-sitemap"
  
  [plugins.inputs]
    buildDir = "."
    exclude = [
      '/admin*',
      '/Games/**/*',
      '/functions/**/*'
    ]
    # Add dynamic game detail pages
    prettyURLs = true
    trailingSlash = false

# Lighthouse plugin disabled - causing build failures
# Re-enable once performance optimizations are fully deployed
# [[plugins]]
#   package = "@netlify/plugin-lighthouse"
#   
#   [plugins.inputs]
#     # Only audit after deploy, not during build
#     audit_on_deploy = true
#     
#     # Use warn instead of error to prevent build failures
#     fail_deploy_on_score_thresholds = false
#     
#     # Set reasonable thresholds
#     [plugins.inputs.thresholds]
#       performance = 75
#       accessibility = 85
#       best-practices = 85
#       seo = 90


[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = false # keep separate files, just minify
  minify = true

[build.processing.html]
  pretty_urls = true
  # Netlify will also inline small critical assets where safe

[build.processing.images]
  compress = true

# Enable Brotli compression for all text assets
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdnjs.buymeacoffee.com https://cdn.jsdelivr.net https://www.googletagmanager.com https://pagead2.googlesyndication.com https://apis.google.com https://www.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://*.cloudfunctions.net https://*.supabase.co wss://*.firebaseio.com; frame-src 'self' https://accounts.google.com https://*.firebaseapp.com https://*.google.com; object-src 'none'; base-uri 'self'"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    # Enable Brotli/Gzip
    Vary = "Accept-Encoding"
    # Enable Netlify Observability headers
    X-Netlify-Trace = "enabled"
    # Help AI agents understand site structure
    X-Robots-Tag = "index, follow"

# Redirects to auth subdomain
[[redirects]]
  from = "auth.glitchrealm.ca"
  to = "https://auth.glitchrealm.ca"
  status = 301
  force = true

[[redirects]]
  from = "/signin"
  to = "https://auth.glitchrealm.ca"
  status = 301
  force = true

[[redirects]]
  from = "/login"
  to = "https://auth.glitchrealm.ca"
  status = 301
  force = true

[[redirects]]
  from = "/edu/*"
  to = "https://edu.glitchrealm.ca/:splat"
  status = 200
  force = true

# Note: edu/ content is in subdomains/edu/ for branch deploys

# 404 page configuration
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
